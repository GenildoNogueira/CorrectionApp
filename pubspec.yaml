name: schoolapp
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  camera: ^0.11.2
  image_picker: ^1.1.2
  opencv_dart: ^2.2.1+4

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

hooks:
  user_defines:
    dartcv4:
      include_modules:
        - core
        - imgproc
        - imgcodecs
      exclude_modules:
        - dnn
        - videoio
        - video
        - highgui
        - features2d
        - calib3d
        - objdetect
        - flann
        - photo
        - stitching
        - freetype
        - aruco
        - contrib
